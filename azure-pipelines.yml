trigger:
  branches:
    include:
    - main
variables:
- name: pythonVersion
  value: '3.11'
- name: artifactName
  value: 'package-artifact'
- name: awsRegion
  value: 'us-east-1'
- name: major
  value: '1'
- name: minor
  value: '0'
- name: patch
  value: $[counter('patch', 1)]

stages:
- stage: Versioning
  displayName: Generate Version
  jobs:
  - job: VersionJob
    displayName: Generate SemVer
    pool:
      vmImage: ubuntu-latest
    steps:
    - script: |
        VERSION=$(major).$(minor).$(patch)
        echo "##vso[task.setvariable variable=appVersion;isOutput=true]$VERSION"
        echo "Generated version: $VERSION"
      name: SetVersion

- stage: Build
  dependsOn: Versioning
  variables:
    appVersion: $[ stageDependencies.Versioning.VersionJob.outputs['SetVersion.appVersion'] ]
  displayName: Continuous Integration
  jobs:
  - job: BuildJob
    displayName: Build and Test Application
    pool:
      vmImage: ubuntu-latest
    steps:
    - task: UsePythonVersion@0
      inputs:
        versionSpec: $(pythonVersion)
      displayName: Use Python $(pythonVersion)

    - task: CmdLine@2
      displayName: Create pip cache directory
      inputs:
        script: |
          mkdir -p ~/.cache/pip

    - task: Cache@2
      inputs:
        key: 'python | "$(Agent.OS)" | requirements.txt'
        restoreKeys: |
          python | "$(Agent.OS)"
        path: $(Pipeline.Workspace)/.pip
      displayName: Cache pip dependencies

    - task: CmdLine@2
      displayName: Install dependencies
      inputs:
        script: |
          python -m pip install --upgrade pip
          pip install --cache-dir $(Pipeline.Workspace)/.pip -r requirements.txt

    - task: CmdLine@2
      displayName: Install lint tool
      inputs:
        script: |
          pip install flake8

    - task: CmdLine@2
      displayName: Run code linting
      inputs:
        script: |
          flake8 app --max-line-length=120

    - task: CmdLine@2
      displayName: Run unit tests
      inputs:
        script: python -m pytest

    - task: ArchiveFiles@2
      displayName: Package application
      inputs:
        rootFolderOrFile: $(Build.SourcesDirectory)
        includeRootFolder: false
        archiveType: zip
        archiveFile: $(Build.ArtifactStagingDirectory)/$(artifactName)-$(appVersion).zip
        replaceExistingArchive: true

    - publish: $(Build.ArtifactStagingDirectory)/$(artifactName)-$(appVersion).zip
      artifact: drop

- stage: SetupAWS
  dependsOn: Build
  displayName: Setup AWS IAM (Instance Profile)
  jobs:
  - job: SetupIAM
    displayName: Create IAM Role and Instance Profile
    pool:
      vmImage: ubuntu-latest

    steps:
    - task: AWSCLI@1
      displayName: Check IAM Access
      inputs:
        awsCredentials: AWS
        regionName: $(awsRegion)
        awsCommand: iam
        awsSubCommand: list-roles

    - task: AWSCLI@1
      displayName: Create IAM Role
      inputs:
        awsCredentials: AWS
        regionName: $(awsRegion)
        awsCommand: iam
        awsSubCommand: create-role
        awsArguments: >
          --role-name aws-elasticbeanstalk-ec2-role
          --assume-role-policy-document '{
            "Version": "2012-10-17",
            "Statement": [
              {
                "Effect": "Allow",
                "Principal": {"Service": "ec2.amazonaws.com"},
                "Action": "sts:AssumeRole"
              }
            ]
          }'
      continueOnError: true

    - task: AWSCLI@1
      displayName: Attach WebTier Policy
      inputs:
        awsCredentials: AWS
        regionName: $(awsRegion)
        awsCommand: iam
        awsSubCommand: attach-role-policy
        awsArguments: >
          --role-name aws-elasticbeanstalk-ec2-role
          --policy-arn arn:aws:iam::aws:policy/AWSElasticBeanstalkWebTier
      continueOnError: true

    - task: AWSCLI@1
      displayName: Create Instance Profile
      inputs:
        awsCredentials: AWS
        regionName: $(awsRegion)
        awsCommand: iam
        awsSubCommand: create-instance-profile
        awsArguments: >
          --instance-profile-name aws-elasticbeanstalk-ec2-role
      continueOnError: true

    - task: AWSCLI@1
      displayName: Add Role to Instance Profile
      inputs:
        awsCredentials: AWS
        regionName: $(awsRegion)
        awsCommand: iam
        awsSubCommand: add-role-to-instance-profile
        awsArguments: >
          --instance-profile-name aws-elasticbeanstalk-ec2-role
          --role-name aws-elasticbeanstalk-ec2-role
      continueOnError: true

    - script: |
        echo "Waiting for IAM propagation..."
        sleep 20
      displayName: Wait for IAM propagation

- stage: Deploy
  displayName: Continuous Deployment
  dependsOn:
  - Build
  - Versioning
  - SetupAWS
  condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))

  variables:
  - group: Susana Diez Gomez - Variables de Entorno
  - name: appVersion
    value: $[ stageDependencies.Versioning.VersionJob.outputs['SetVersion.appVersion'] ]

  jobs:
  - deployment: DeployAWS
    displayName: Deploy to AWS
    environment:
      name: Susana-Deploy

    strategy:
      runOnce:
        deploy:
          steps:

          - download: current
            artifact: drop

          - task: AWSCLI@1
            displayName: Upload artifact to S3
            inputs:
              awsCredentials: AWS
              regionName: $(awsRegion)
              awsCommand: s3
              awsSubCommand: cp
              awsArguments: "$(Pipeline.Workspace)/drop/$(artifactName)-$(appVersion).zip s3://$(S3_BUCKET)/Susana-$(appVersion).zip"

          - task: AWSCLI@1
            displayName: Create application version
            inputs:
              awsCredentials: AWS
              regionName: $(awsRegion)
              awsCommand: elasticbeanstalk
              awsSubCommand: create-application-version
              awsArguments: >
                --application-name $(APPLICATION_NAME)
                --version-label Susana-$(appVersion)
                --source-bundle S3Bucket=$(S3_BUCKET),S3Key=Susana-$(appVersion).zip

          - task: AWSCLI@1
            displayName: Try create environment
            continueOnError: true
            inputs:
              awsCredentials: AWS
              regionName: $(awsRegion)
              awsCommand: elasticbeanstalk
              awsSubCommand: create-environment
              awsArguments: >
                --application-name $(APPLICATION_NAME)
                --environment-name $(ENVIRONMENT_NAME)
                --solution-stack-name "64bit Amazon Linux 2023 v4.11.0 running Python 3.11"
                --version-label Susana-$(appVersion)
                --option-settings Namespace=aws:autoscaling:launchconfiguration,OptionName=IamInstanceProfile,Value=aws-elasticbeanstalk-ec2-role

          - task: AWSCLI@1
            displayName: Update environment
            inputs:
              awsCredentials: AWS
              regionName: $(awsRegion)
              awsCommand: elasticbeanstalk
              awsSubCommand: update-environment
              awsArguments: >
                --environment-name $(ENVIRONMENT_NAME)
                --version-label Susana-$(appVersion)

          - script: |
              echo "Waiting for environment..."

              for i in {1..30}
              do
                STATUS=$(aws elasticbeanstalk describe-environments \
                  --region $(awsRegion) \
                  --environment-names $(ENVIRONMENT_NAME) \
                  --query "Environments[0].Status" \
                  --output text)

                echo "Status: $STATUS"

                if [ "$STATUS" = "Ready" ]; then
                  echo "Environment ready"
                  exit 0
                fi

                sleep 10
              done

              echo "Timeout waiting for environment"
              exit 1
            displayName: Wait for environment readiness
            env:
              AWS_DEFAULT_REGION: $(awsRegion)

          - script: |
              HEALTH=$(aws elasticbeanstalk describe-environments \
                --region $(awsRegion) \
                --environment-names $(ENVIRONMENT_NAME) \
                --query "Environments[0].Health" \
                --output text)

              echo "Health: $HEALTH"

              if [ "$HEALTH" != "Green" ]; then
                echo "Environment unhealthy"
                exit 1
              fi
            displayName: Validate environment health
            env:
              AWS_DEFAULT_REGION: $(awsRegion)

          - task: AWSCLI@1
            displayName: Get EB Events (Debug)
            inputs:
              awsCredentials: AWS
              regionName: $(awsRegion)
              awsCommand: elasticbeanstalk
              awsSubCommand: describe-events
              awsArguments: >
                --environment-name $(ENVIRONMENT_NAME)
                --query "Events[?Severity=='ERROR'].[EventDate,Message]"
                --output table

          - task: AWSCLI@1
            displayName: Get Environment URL
            inputs:
              awsCredentials: AWS
              regionName: $(awsRegion)
              awsCommand: elasticbeanstalk
              awsSubCommand: describe-environments
              awsArguments: >
                --environment-names $(ENVIRONMENT_NAME)
                --query "Environments[0].CNAME"
                --output text
            name: GetURL