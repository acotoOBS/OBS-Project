trigger:
  branches:
    include:
    - main
variables:
- name: pythonVersion
  value: '3.11'
- name: artifactName
  value: 'package-artifact'
- name: awsRegion
  value: 'us-east-1'

stages:
- stage: Build
  displayName: Continuous Integration
  jobs:
  - job: BuildJob
    displayName: Build and Test Application
    pool:
      vmImage: ubuntu-latest
    steps:
    - task: UsePythonVersion@0
      inputs:
        versionSpec: $(pythonVersion)
      displayName: Use Python $(pythonVersion)

    - task: CmdLine@2
      displayName: Create pip cache directory
      inputs:
        script: |
          mkdir -p ~/.cache/pip

    - task: Cache@2
      inputs:
        key: 'python | "$(Agent.OS)" | requirements.txt'
        restoreKeys: |
          python | "$(Agent.OS)"
        path: $(Pipeline.Workspace)/.pip
      displayName: Cache pip dependencies

    - task: CmdLine@2
      displayName: Install dependencies
      inputs:
        script: |
          python -m pip install --upgrade pip
          pip install --cache-dir $(Pipeline.Workspace)/.pip -r requirements.txt

    - task: CmdLine@2
      displayName: Install lint tool
      inputs:
        script: |
          pip install flake8

    - task: CmdLine@2
      displayName: Run code linting
      inputs:
        script: |
          flake8 app --max-line-length=120

    - task: CmdLine@2
      displayName: Run unit tests
      inputs:
        script: python -m pytest

    - task: ArchiveFiles@2
      displayName: Package application
      inputs:
        rootFolderOrFile: $(Build.SourcesDirectory)
        includeRootFolder: false
        archiveType: zip
        archiveFile: $(Build.ArtifactStagingDirectory)/$(artifactName)-$(Build.BuildId).zip
        replaceExistingArchive: true

    - task: ecdc45f6-832d-4ad9-b52b-ee49e94659be@1
      inputs:
        path: $(Build.ArtifactStagingDirectory)/$(artifactName)-$(Build.BuildId).zip
        artifactName: drop

- stage: Deploy
  displayName: Continuous Deployment
  dependsOn:
  - Build
  condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
  variables:
  - group: Susana Diez Gomez - Variables de Entorno
  jobs:
  - deployment: DeployAWS
    displayName: Deploy to AWS
    environment:
      name: Susana-Deploy
    strategy:
      runOnce:
        deploy:
          steps:
          - task: 30f35852-3f7e-4c0c-9a88-e127b4f97211@1
            inputs:
              alias: current
              artifact: drop

          - task: AWSCLI@1
            displayName: Upload artifact to S3
            inputs:
              awsCredentials: AWS
              regionName: $(AWS_REGION)
              awsCommand: s3
              awsSubCommand: cp
              awsArguments: "$(Pipeline.Workspace)/drop/$(artifactName)-$(Build.BuildId).zip s3://$(S3_BUCKET)/Susana-$(Build.BuildId).zip"

          - task: AWSCLI@1
            displayName: Create application version
            inputs:
              awsCredentials: AWS
              regionName: $(AWS_REGION)
              awsCommand: elasticbeanstalk
              awsSubCommand: create-application-version
              awsArguments: >
                --application-name $(APPLICATION_NAME) --version-label Susana-$(Build.BuildId) --source-bundle S3Bucket=$(S3_BUCKET),S3Key=Susana-$(Build.BuildId).zip

          - task: AWSCLI@1
            name: CheckEnv
            displayName: Check and set environment existence
            inputs:
              awsCredentials: AWS
              regionName: $(AWS_REGION)
              awsCommand: elasticbeanstalk
              awsSubCommand: describe-environments
              awsArguments: >
                --environment-names $(ENVIRONMENT_NAME) --query "Environments[0].EnvironmentName" --output text
            continueOnError: true

          - task: AWSCLI@1
            displayName: Create environment
            condition: eq(variables['CheckEnv'], 'None')
            inputs:
              awsCredentials: AWS
              regionName: $(AWS_REGION)
              awsCommand: elasticbeanstalk
              awsSubCommand: create-environment
              awsArguments: >
                --application-name $(APPLICATION_NAME) --environment-name $(ENVIRONMENT_NAME) --solution-stack-name "64bit Amazon Linux 2023 v4.11.0 running Python 3.11" --version-label Susana-$(Build.BuildId)

          - task: AWSCLI@1
            displayName: Update environment
            condition: ne(variables['CheckEnv'], 'None')
            inputs:
              awsCredentials: AWS
              regionName: $(AWS_REGION)
              awsCommand: elasticbeanstalk
              awsSubCommand: update-environment
              awsArguments: >
                --environment-name $(ENVIRONMENT_NAME) --version-label Susana-$(Build.BuildId)

          - task: AWSCLI@1
            displayName: Get Environment URL
            inputs:
              awsCredentials: AWS
              regionName: $(AWS_REGION)
              awsCommand: elasticbeanstalk
              awsSubCommand: describe-environments
              awsArguments: >
                --environment-names $(ENVIRONMENT_NAME) --query "Environments[0].CNAME" --output text
            name: GetURL

          - task: CmdLine@2
            displayName: Print Application URL
            inputs:
              script: |
                echo "URL de la aplicación:"
                echo "http://$(GetURL.AWSCLIOutput)"