trigger:
- main

variables:

  pythonVersion: '3.11'
  artifactName: 'package-artifact'
  awsRegion: 'us-east-1'

stages:

# =========================
# STAGE 1 - CI / BUILD
# =========================

- stage: Build
  displayName: Continuous Integration

  jobs:

  - job: BuildJob
    displayName: Build and Test Application

    pool:
      vmImage: ubuntu-latest

    steps:

    - task: UsePythonVersion@0
      inputs:
        versionSpec: $(pythonVersion)
      displayName: Use Python $(pythonVersion)

# Create cache directory
    - script: |
        mkdir -p ~/.cache/pip
      displayName: Create pip cache directory

# Cache pip dependencies
    - task: Cache@2
      inputs:
        key: 'python | "$(Agent.OS)" | requirements.txt'
        restoreKeys: |
          python | "$(Agent.OS)"
        path: $(Pipeline.Workspace)/.pip
      displayName: Cache pip dependencies

# Install dependencies
    - script: |
        python -m pip install --upgrade pip
        pip install --cache-dir $(Pipeline.Workspace)/.pip -r requirements.txt
      displayName: Install dependencies

# Install lint tool
    - script: |
        pip install flake8
      displayName: Install lint tool

# Lint code
    - script: |
        flake8 app --max-line-length=120
      displayName: Run code linting

# Run tests
    - script: python -m pytest
      displayName: Run unit tests

# Create artifact
    - task: ArchiveFiles@2
      displayName: Package application
      inputs:
        rootFolderOrFile: $(Build.SourcesDirectory)
        includeRootFolder: false
        archiveType: zip
        archiveFile: $(Build.ArtifactStagingDirectory)/$(artifactName)-$(Build.BuildId).zip
        replaceExistingArchive: true

# Publish artifact
    - publish: $(Build.ArtifactStagingDirectory)/$(artifactName)-$(Build.BuildId).zip
      artifact: drop


# =========================
# STAGE 2 - CD / DEPLOY
# =========================

- stage: Deploy
  displayName: Continuous Deployment

  dependsOn: Build

  condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))

  variables:
  - group: Susana Diez Gomez - Variables de Entorno

  jobs:

  - deployment: DeployAWS
    displayName: Deploy to AWS

    environment: Susana-Deploy

    strategy:
      runOnce:

        deploy:

          steps:

# Download artifact
          - download: current
            artifact: drop

# Upload artifact to S3
          - task: AWSCLI@1
            displayName: Upload artifact to S3
            inputs:
              awsCredentials: AWS
              regionName: $(AWS_REGION)
              awsCommand: s3
              awsSubCommand: cp
              awsArguments: "$(Pipeline.Workspace)/drop/$(artifactName)-$(Build.BuildId).zip s3://$(S3_BUCKET)/Susana-$(Build.BuildId).zip"

# Create Application Version Deploy
          - task: AWSCLI@1
            displayName: Create application version
            inputs:
              awsCredentials: AWS
              regionName: $(AWS_REGION)
              awsCommand: elasticbeanstalk
              awsSubCommand: create-application-version
              awsArguments: >
                --application-name $(APPLICATION_NAME)
                --version-label Susana-$(Build.BuildId)
                --source-bundle S3Bucket=$(S3_BUCKET),S3Key=Susana-$(Build.BuildId).zip

# Check if environment exists
          - task: AWSCLI@1
            name: CheckEnv
            displayName: Check if environment exists
            continueOnError: true
            inputs:
              awsCredentials: AWS
              regionName: $(AWS_REGION)
              awsCommand: elasticbeanstalk
              awsSubCommand: describe-environments
              awsArguments: >
                --environment-names $(ENVIRONMENT_NAME)

          # Update environment if exists
          - task: AWSCLI@1
            name: TryUpdate
            displayName: Try update environment
            continueOnError: true
            inputs:
              awsCredentials: AWS
              regionName: $(AWS_REGION)
              awsCommand: elasticbeanstalk
              awsSubCommand: update-environment
              awsArguments: >
                --environment-name $(ENVIRONMENT_NAME)
                --version-label Susana-$(Build.BuildId)

# Create environment if NOT exists
# Updated solution stack to a supported version (Python 3.11 / Amazon Linux 2)
          - task: AWSCLI@1
            displayName: Create environment if update failed
            condition: failed()
            inputs:
              awsCredentials: AWS
              regionName: $(AWS_REGION)
              awsCommand: elasticbeanstalk
              awsSubCommand: create-environment
              awsArguments: >
                --application-name $(APPLICATION_NAME)
                --environment-name $(ENVIRONMENT_NAME)
                --solution-stack-name "64bit Amazon Linux 2023 v4.11.0 running Python 3.11"
                --version-label Susana-$(Build.BuildId)

          - task: AWSCLI@1
            displayName: Wait for environment to be ready
            inputs:
              awsCredentials: AWS
              regionName: $(AWS_REGION)
              awsCommand: elasticbeanstalk
              awsSubCommand: wait
              awsArguments: environment-updated --environment-names $(ENVIRONMENT_NAME)

          - task: AWSCLI@1
            displayName: Get Environment URL
            continueOnError: true
            inputs:
              awsCredentials: AWS
              regionName: $(AWS_REGION)
              awsCommand: elasticbeanstalk
              awsSubCommand: describe-environments
              awsArguments: >
                --environment-names $(ENVIRONMENT_NAME)
                --query "Environments[0].CNAME"
                --output text
            name: GetURL    

          - script: |
              echo "URL de la aplicación:"
              echo "http://$(GetURL.AWSCLIOutput)"
            displayName: Print Application URL